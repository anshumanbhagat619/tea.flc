<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Leaf FLC Quality Control System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
        #reader { width: 100% !important; border: none !important; }
        #reader video { border-radius: 12px; }
        
        /* Animation for smooth tab switching */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } } 
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }

        /* Print Setup Modal Styles */
        .print-settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .print-settings-group { display: flex; flex-direction: column; gap: 0.75rem; }
        .print-settings-label { font-size: 0.75rem; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .print-settings-input { width: 100%; padding: 0.75rem; border: 2px solid #cbd5e1; border-radius: 0.75rem; font-weight: 600; }
        .print-preview { background: #f1f5f9; border: 2px dashed #cbd5e1; border-radius: 0.75rem; padding: 1.5rem; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-weight: bold; font-size: 0.875rem; }
        
        /* Print Footer for QR Tags */
        .print-footer-info { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 2px solid #e2e8f0; text-align: center; font-size: 0.75rem; color: #64748b; font-weight: 600; }
        
        /* Challan Receipt Styles */
        .challan-printable { max-height: 95vh; overflow-y: auto; }

        /* BULLETPROOF A4 1/3 PRINT CSS */
        @media print {
            * { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            body, html { margin: 0 !important; padding: 0 !important; background: white !important; }
            body * { visibility: hidden; }
            
            .challan-printable, .challan-printable * { visibility: visible !important; }
            
            /* Locks the challan strictly to the top-left of the page */
            .challan-printable {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 210mm !important;
                height: 99mm !important;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
                box-sizing: border-box !important;
                page-break-after: always !important;
                z-index: 9999 !important;
            }
            .no-print { display: none !important; }
            .print-footer-info { display: block; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app"></div>

    <script>
        let db = { users: [], parties: [], samples: [], counters: { samples: 0 }, settings: { companyName: 'TEA LEAF QUALITY CONTROL SYSTEM', challanTitle: 'SUPPLIER DELIVERY CHALLAN', footerText: '' } };
        let currentUser = null;
        let view = 'login';
        let html5QrCode = null;
        
        // --- UI State Variables ---
        let activeAdminTab = 'staff';
        let currentPage = 1;
        const itemsPerPage = 10;
        let searchQuery = '';
        let selectedFrom = (() => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); })();
        let selectedTo = (() => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); })();
        let currentSection = 'reports';

        // --- Database Management ---
        function loadDB() {
            const stored = localStorage.getItem('teaAppDb');
            if (stored) {
                db = JSON.parse(stored);
                if (!db.settings) {
                    db.settings = { companyName: 'TEA LEAF QUALITY CONTROL SYSTEM', challanTitle: 'SUPPLIER DELIVERY CHALLAN', footerText: '' };
                }
                const savedUserId = sessionStorage.getItem('teaAppUserId');
                if (savedUserId) {
                    const user = db.users.find(u => u.id === savedUserId);
                    if (user) { currentUser = user; view = user.role; }
                }
            } else { view = 'setup'; }
        }

        function saveDB() {
            localStorage.setItem('teaAppDb', JSON.stringify(db));
        }

        function exportDatabase() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `tea_flc_backup_${new Date().toISOString().slice(0,10)}.json`);
            dl.click();
            toast("Database Backup Saved to Downloads");
        }

        function importDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.users) {
                        db = imported;
                        saveDB();
                        toast("Data Restored Successfully!");
                        setTimeout(() => location.reload(), 1000);
                    }
                } catch (err) { toast("Error: Invalid Backup File", "error"); }
            };
            reader.readAsText(file);
        }

        // --- UI Utilities ---
        function toast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `fixed bottom-5 right-5 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white py-3 px-6 rounded-xl shadow-2xl z-[100] font-bold`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function switchAdminTab(tab) {
            activeAdminTab = tab;
            render();
        }

        function switchSection(section) {
            currentSection = section;
            render();
        }

        function handleSearch(e) {
            searchQuery = e.target.value.toLowerCase();
            currentPage = 1;
            render();
        }

        function changePage(delta) {
            currentPage += delta;
            render();
        }

        function render() {
            const app = document.getElementById('app');
            if (view === 'setup') renderSetup(app);
            else if (view === 'login') renderLogin(app);
            else if (view === 'challans') renderChallansView(app);
            else renderMainApp(app);
        }

        function renderSetup(app) {
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4 bg-green-50">
                    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
                        <h1 class="text-2xl font-black text-center mb-2 text-green-800 uppercase">System Setup</h1>
                        <p class="text-sm text-gray-500 mb-8 text-center">Create the first Admin (Master) ID.</p>
                        <div class="space-y-4">
                            <input type="text" id="mName" placeholder="Full Name" class="w-full px-4 py-3 border-2 rounded-xl">
                            <input type="text" id="mId" placeholder="Create Admin User ID" class="w-full px-4 py-3 border-2 rounded-xl font-mono">
                            <input type="password" id="mPass" placeholder="Set Password" class="w-full px-4 py-3 border-2 rounded-xl">
                            <button onclick="handleSetup()" class="w-full bg-green-700 text-white py-4 rounded-xl font-black text-lg">ACTIVATE SYSTEM</button>
                        </div>
                    </div>
                </div>`;
        }

        function renderLogin(app) {
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4 bg-slate-100">
                    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md border-t-8 border-green-700">
                        <h1 class="text-3xl font-black text-center mb-8 text-slate-800 tracking-tight">TEA LEAF FLC</h1>
                        <div class="space-y-4">
                            <input type="text" id="lId" placeholder="USER ID" class="w-full px-4 py-4 border-2 rounded-xl font-mono text-lg outline-none focus:border-green-500">
                            <input type="password" id="lPass" placeholder="PASSWORD" class="w-full px-4 py-4 border-2 rounded-xl text-lg outline-none focus:border-green-500" onkeypress="if(event.key==='Enter')handleLogin()">
                            <button onclick="handleLogin()" class="w-full bg-green-700 text-white py-4 rounded-xl font-black text-lg shadow-lg">SIGN IN</button>
                            <p id="lErr" class="text-red-600 text-center font-bold mt-2"></p>
                        </div>
                    </div>
                </div>`;
        }

        function renderMainApp(app) {
            let clerkSection = '';
            let analystSection = '';

            if (currentUser.role === 'clerk') {
                const pendingFinal = db.samples.filter(s => s.status === 'awaiting_final_weight');
                clerkSection = `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-8 border-blue-500">
                            <h2 class="text-xl font-black mb-4 text-blue-900 uppercase">1. Initial Entry (Gross)</h2>
                            <div class="space-y-4">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <input type="text" id="vNo" placeholder="Vehicle No" maxlength="15" class="w-full px-4 py-3 border-2 rounded-xl font-mono">
                                    <select id="pName" class="w-full px-4 py-3 border-2 rounded-xl bg-white text-sm font-bold">
                                        <option value="">Select Garden</option>
                                        ${db.parties.sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}
                                    </select>
                                </div>
                                <input type="number" id="gWeight" placeholder="Gross Loaded Weight (Kgs)" class="w-full px-4 py-3 border-2 rounded-xl font-black text-xl text-blue-700">
                                <button onclick="submitSample()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg">GENERATE TAG</button>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-8 border-indigo-600">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-xl font-black text-indigo-900 uppercase">2. Final Weight</h2>
                                <button onclick="startScanner('clerk')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-xs">SCAN TAG</button>
                            </div>
                            <p class="text-xs text-gray-400 mb-4 uppercase font-bold">Samples waiting for tare weight: ${pendingFinal.length}</p>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                ${pendingFinal.map(s => `<button onclick="openFinalWeightModal('${s.id}')" class="p-3 bg-indigo-50 border border-indigo-100 rounded-xl font-black text-indigo-700 text-sm"># ${s.sampleSerialNo}</button>`).join('')}
                            </div>
                        </div>
                    </div>`;
            } else if (currentUser.role === 'analyst') {
                const pendingQC = db.samples.filter(s => s.status === 'pending_qc');
                analystSection = `
                    <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 border-l-8 border-orange-500">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-black text-orange-900 uppercase tracking-tight">Quality Lab Entry</h2>
                            <button onclick="startScanner('analyst')" class="bg-orange-600 text-white px-6 py-3 rounded-xl font-black shadow-lg flex items-center gap-2 tracking-widest">
                                SCAN SAMPLE QR
                            </button>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                            ${pendingQC.length === 0 ? '<p class="col-span-full text-center py-10 text-gray-300 font-bold bg-gray-50 rounded-xl">NO SAMPLES PENDING IN LAB</p>' : 
                              pendingQC.map(s=>`<button onclick='openFlcModal("${s.id}")' class="p-4 bg-orange-50 border-2 border-orange-100 rounded-xl text-center font-black text-orange-700 hover:scale-105 transition"># ${s.sampleSerialNo}</button>`).join('')}
                        </div>
                    </div>`;
            }

            // --- Pagination Logic ---
            const allFiltered = getFilteredSamples();
            const totalPages = Math.ceil(allFiltered.length / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedSamples = allFiltered.slice(startIndex, startIndex + itemsPerPage);

            const menuItems = [
                ...(currentUser.role === 'master' ? [
                    { id: 'dashboard', label: '📊 Dashboard', icon: '📊' }
                ] : []),
                { id: 'reports', label: '📋 Factory Reports', icon: '📋' },
                { id: 'challans', label: '🧾 View Challans', icon: '🧾' },
                ...(currentUser.role === 'master' ? [
                    { id: 'admin', label: '🏢 Admin Dashboard', icon: '🏢' },
                    { id: 'settings', label: '⚙️ System Settings', icon: '⚙️' },
                    { id: 'users', label: '👥 User Management', icon: '👥' },
                    { id: 'gardens', label: '🌱 Garden Registry', icon: '🌱' }
                ] : [])
            ];

            app.innerHTML = `
                <header class="bg-slate-900 text-white p-5 shadow-2xl mb-6 sticky top-0 z-40 no-print">
                    <div class="max-w-7xl mx-auto flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center font-black italic shadow-inner">TEA</div>
                            <div>
                                <h1 class="text-lg font-black uppercase tracking-tighter">Tea Quality Control System</h1>
                                <p class="text-[10px] font-bold text-green-400 uppercase tracking-widest">${currentUser.name} // ${currentUser.role}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openPrintSetup()" class="bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg font-bold text-xs">🖨️ PRINT SETUP</button>
                            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-2 rounded-lg font-black text-xs">EXIT</button>
                        </div>
                    </div>
                </header>
                <div class="flex min-h-screen bg-slate-50">
                    <aside class="w-64 bg-slate-800 text-white p-6 shadow-xl">
                        <nav class="space-y-2">
                            ${menuItems.map(item => `
                                <button onclick="switchSection('${item.id}')" class="w-full text-left px-4 py-3 rounded-lg font-bold transition-all ${currentSection === item.id ? 'bg-green-600 text-white' : 'text-slate-300 hover:bg-slate-700 hover:text-white'}">
                                    ${item.icon} ${item.label.replace(item.icon, '').trim()}
                                </button>
                            `).join('')}
                        </nav>
                    </aside>
                    <main class="flex-1 p-6 overflow-auto">
                        ${clerkSection}
                        ${analystSection}
                        ${renderSectionContent()}
                    </main>
                </div>`;
        }

        function renderAdminDashboard() {
            const totalSamples = db.samples.length;
            const completedSamples = db.samples.filter(s => s.status === 'complete').length;
            const totalStaff = db.users.length;
            const totalGardens = db.parties.length;

            return `
                <div class="mb-8">
                    <h1 class="text-3xl font-black text-slate-800 uppercase italic mb-8">🏢 Admin Dashboard</h1>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl shadow-lg p-6 text-white">
                            <div class="text-5xl font-black mb-2">${totalSamples}</div>
                            <div class="text-sm font-bold opacity-90">Total Samples</div>
                        </div>
                        <div class="bg-gradient-to-br from-green-500 to-green-600 rounded-2xl shadow-lg p-6 text-white">
                            <div class="text-5xl font-black mb-2">${completedSamples}</div>
                            <div class="text-sm font-bold opacity-90">Completed Reports</div>
                        </div>
                        <div class="bg-gradient-to-br from-purple-500 to-purple-600 rounded-2xl shadow-lg p-6 text-white">
                            <div class="text-5xl font-black mb-2">${totalStaff}</div>
                            <div class="text-sm font-bold opacity-90">Active Staff</div>
                        </div>
                        <div class="bg-gradient-to-br from-orange-500 to-orange-600 rounded-2xl shadow-lg p-6 text-white">
                            <div class="text-5xl font-black mb-2">${totalGardens}</div>
                            <div class="text-sm font-bold opacity-90">Registered Gardens</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border-l-8 border-indigo-600 hover:shadow-xl transition-shadow cursor-pointer" onclick="switchSection('users')">
                            <div class="p-6">
                                <div class="flex items-start justify-between">
                                    <div>
                                        <h3 class="text-2xl font-black text-indigo-900 mb-2">👥 User Access Control</h3>
                                        <p class="text-slate-600 text-sm">Manage staff members, roles & permissions</p>
                                    </div>
                                    <div class="text-4xl opacity-30">👥</div>
                                </div>
                                <div class="mt-4 pt-4 border-t-2 border-slate-100">
                                    <span class="text-xs font-bold text-indigo-600 uppercase">View Active Users →</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border-l-8 border-emerald-600 hover:shadow-xl transition-shadow cursor-pointer" onclick="switchSection('gardens')">
                            <div class="p-6">
                                <div class="flex items-start justify-between">
                                    <div>
                                        <h3 class="text-2xl font-black text-emerald-900 mb-2">🌱 Garden Management</h3>
                                        <p class="text-slate-600 text-sm">Add, edit & manage garden registries</p>
                                    </div>
                                    <div class="text-4xl opacity-30">🌱</div>
                                </div>
                                <div class="mt-4 pt-4 border-t-2 border-slate-100">
                                    <span class="text-xs font-bold text-emerald-600 uppercase">Manage Gardens →</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border-l-8 border-purple-600 hover:shadow-xl transition-shadow cursor-pointer" onclick="switchSection('settings')">
                            <div class="p-6">
                                <div class="flex items-start justify-between">
                                    <div>
                                        <h3 class="text-2xl font-black text-purple-900 mb-2">⚙️ System Settings</h3>
                                        <p class="text-slate-600 text-sm">Configure company details & challan settings</p>
                                    </div>
                                    <div class="text-4xl opacity-30">⚙️</div>
                                </div>
                                <div class="mt-4 pt-4 border-t-2 border-slate-100">
                                    <span class="text-xs font-bold text-purple-600 uppercase">Update Settings →</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border-l-8 border-red-600 hover:shadow-xl transition-shadow cursor-pointer" onclick="exportDatabase()">
                            <div class="p-6">
                                <div class="flex items-start justify-between">
                                    <div>
                                        <h3 class="text-2xl font-black text-red-900 mb-2">💾 Backup/Export</h3>
                                        <p class="text-slate-600 text-sm">Backup entire database for safety</p>
                                    </div>
                                    <div class="text-4xl opacity-30">💾</div>
                                </div>
                                <div class="mt-4 pt-4 border-t-2 border-slate-100">
                                    <span class="text-xs font-bold text-red-600 uppercase">Download Backup →</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border-l-8 border-cyan-600 hover:shadow-xl transition-shadow cursor-pointer" onclick="openPrintSetup()">
                            <div class="p-6">
                                <div class="flex items-start justify-between">
                                    <div>
                                        <h3 class="text-2xl font-black text-cyan-900 mb-2">🖨️ Print Settings</h3>
                                        <p class="text-slate-600 text-sm">Configure printers, paper sizes & profiles</p>
                                    </div>
                                    <div class="text-4xl opacity-30">🖨️</div>
                                </div>
                                <div class="mt-4 pt-4 border-t-2 border-slate-100">
                                    <span class="text-xs font-bold text-cyan-600 uppercase">Setup Printers →</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border-l-8 border-blue-600 hover:shadow-xl transition-shadow cursor-pointer" onclick="switchSection('reports')">
                            <div class="p-6">
                                <div class="flex items-start justify-between">
                                    <div>
                                        <h3 class="text-2xl font-black text-blue-900 mb-2">📊 View Reports</h3>
                                        <p class="text-slate-600 text-sm">View & download factory quality reports</p>
                                    </div>
                                    <div class="text-4xl opacity-30">📊</div>
                                </div>
                                <div class="mt-4 pt-4 border-t-2 border-slate-100">
                                    <span class="text-xs font-bold text-blue-600 uppercase">Export Reports →</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSectionContent() {
            if (currentSection === 'admin') {
                return renderAdminDashboard();
            }

            if (currentSection === 'dashboard') {
                const today = new Date().toISOString().split('T')[0];
                const todaySamples = db.samples.filter(s => s.createdAt.startsWith(today));
                const totalWeight = todaySamples.reduce((sum, s) => sum + (s.finalCalculatedWeight || 0), 0);
                const avgFLC = todaySamples.length > 0 ? todaySamples.reduce((sum, s) => sum + s.flcPercent, 0) / todaySamples.length : 0;

                return `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-green-500">
                            <h3 class="font-black text-slate-700 uppercase text-sm mb-2">Today's Samples</h3>
                            <p class="text-3xl font-black text-green-600">${todaySamples.length}</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
                            <h3 class="font-black text-slate-700 uppercase text-sm mb-2">Total Weight</h3>
                            <p class="text-3xl font-black text-blue-600">${totalWeight.toFixed(1)} Kgs</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-orange-500">
                            <h3 class="font-black text-slate-700 uppercase text-sm mb-2">Avg FLC</h3>
                            <p class="text-3xl font-black text-orange-600">${avgFLC.toFixed(1)}%</p>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-md p-6">
                        <h2 class="text-lg font-black text-slate-800 uppercase italic mb-6">Recent Activity</h2>
                        <div class="space-y-3">
                            ${todaySamples.slice(-5).reverse().map(s => `
                                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-lg">
                                    <div>
                                        <div class="font-bold text-slate-800">#${s.sampleSerialNo} - ${s.partyName}</div>
                                        <div class="text-sm text-slate-500">${s.vehicleNo} • ${s.finalCalculatedWeight || 0} Kgs</div>
                                    </div>
                                    <div class="text-right">

                const totalPages = Math.ceil(allFiltered.length / itemsPerPage);

                return `
                    <div class="bg-white rounded-2xl shadow-md p-6 overflow-hidden">
                        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b-2 border-slate-100 pb-4">
                            <h2 class="text-lg font-black text-slate-800 uppercase italic">Factory Reports</h2>
                            <div class="flex gap-3 w-full md:w-auto flex-wrap items-center">
                                <div class="flex gap-2 items-center bg-slate-50 border-2 border-slate-200 rounded-xl px-3 py-1.5 focus-within:border-green-500 transition-colors">
                                    <span class="text-slate-400 text-sm">🔍</span>

                                        <tr class="hover:bg-slate-50/50 transition">
                                            <td class="p-4 font-black text-slate-400">#${s.sampleSerialNo}</td>
                                            <td class="p-4">
                                                <div class="font-black text-slate-800">${s.partyName}</div>
                                                <div class="text-[10px] font-mono text-slate-400">${s.vehicleNo}</div>
                                            </td>
                                            <td class="p-4 leading-tight">
                                                <div class="text-xs text-slate-500">Gross: ${s.grossLoadedWeight} Kgs</div>
                                                <div class="text-xs text-slate-500 italic">Empty: ${s.emptyVehicleWeight || 0} Kgs</div>
                                                <div class="font-bold text-slate-700 underline">Net: ${s.netWeight || 0} Kgs</div>
                                            </td>
                                            <td class="p-4 leading-tight">
                                                <div class="text-[10px] font-bold">FLC: ${s.flcPercent}%</div>
                                                <div class="text-[10px] text-slate-500 mt-1">Moisture: ${s.moistureDeduction}%</div>
                                                <div class="text-[10px] text-slate-500">Damage: ${s.damagedLeaf}%</div>

                                                <div class="text-lg font-black text-green-700">${s.finalCalculatedWeight || 0} <span class="text-[10px] font-normal">Kgs</span></div>

                                            <td class="p-4 leading-tight">
                                                <div class="text-[10px] font-bold text-blue-700">${s.createdBy || '—'}</div>
                                                <div class="text-[10px] text-orange-600 font-bold">${s.qcAnalyst || '—'}</div>

                                            ${currentUser.role==='master'?`<td class="p-4"><button onclick="editSample('${s.id}')" class="text-blue-300 hover:text-blue-500 font-black transition mr-2">EDIT</button><button onclick="deleteSample('${s.id}')" class="text-red-300 hover:text-red-500 font-black transition">DEL</button></td>`:''}

                        <div class="flex flex-col sm:flex-row justify-between items-center mt-6 px-2 pt-4 border-t-2 border-slate-50">

                            <div class="flex gap-2 items-center">

                return renderAdminSection('gardens');

                return `
                    <div class="bg-white rounded-2xl shadow-md p-6">
                        <div class="mb-6 pb-4 border-b-2 border-slate-100">
                            <h2 class="text-lg font-black text-slate-800 uppercase italic">📋 Completed Sample Challans</h2>

                                        <div class="bg-gradient-to-br from-slate-50 to-slate-100 border-2 border-slate-200 rounded-xl p-4 hover:shadow-lg transition-shadow">
                                            <div class="flex justify-between items-start mb-3 pb-3 border-b border-slate-300">
                                                <div>
                                                    <div class="font-black text-slate-800 text-lg">#${s.sampleSerialNo}</div>
                                                    <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">${s.partyName}</div>
                                                </div>
                                                <div class="text-right">
                                                    <div class="text-xs font-black text-green-700">✓ COMPLETE</div>
                                                    <div class="text-[10px] text-slate-400">${processingHours} min</div>
                                                </div>
                                            </div>
                                            <div class="space-y-2 text-xs mb-4">
                                                <div class="flex justify-between"><span class="text-slate-600">Vehicle:</span><span class="font-bold text-slate-800">${s.vehicleNo}</span></div>
                                                <div class="flex justify-between"><span class="text-slate-600">Net Weight:</span><span class="font-bold text-slate-800">${s.netWeight || 0} Kg</span></div>
                                                <div class="flex justify-between"><span class="text-slate-600">Final Weight:</span><span class="font-black text-green-700 text-sm">${s.finalCalculatedWeight || 0} Kg</span></div>
                                                <div class="flex justify-between"><span class="text-slate-600">FLC:</span><span class="font-bold text-orange-600">${s.flcPercent}%</span></div>
                                            </div>
                                            <div class="flex gap-2">
                                                <button onclick="showChallan(db.samples.find(x=>x.id==='${s.id}'), false)" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-black text-xs hover:bg-blue-700 transition">👁️ VIEW</button>
                                                <button onclick="showChallan(db.samples.find(x=>x.id==='${s.id}'), true)" class="flex-1 bg-green-600 text-white py-2 rounded-lg font-black text-xs hover:bg-green-700 transition">🖨️ PRINT</button>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>`
                        }
                    </div>
                `;
            }

            return '<div class="text-center py-20 text-slate-400 font-bold">Section not found</div>';
        }

        function renderAdminSection(section) {
            let content = '';

            if (section === 'staff') {
                content = `
                    <div class="bg-white p-8 rounded-2xl shadow-xl border-t-8 border-indigo-600 animate-fade-in">

                        <div class="space-y-4 mb-8">
                            <input type="text" id="nuName" placeholder="Full Name" class="w-full p-3 border-2 rounded-xl">
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" id="nuId" placeholder="User ID (Login ID)" class="w-full p-3 border-2 rounded-xl font-mono">
                                <input type="text" id="nuPass" placeholder="Password" class="w-full p-3 border-2 rounded-xl">

                            ${db.users.map(u=>`<div class="text-xs bg-slate-50 p-4 rounded-xl flex justify-between items-center border border-slate-100">
                                <div><div class="font-black text-indigo-900">${u.id} <span class="font-normal text-slate-400 lowercase">(${u.role})</span></div><div class="text-[10px] text-slate-400 font-bold uppercase">${u.name} // Pass: ${u.password}</div></div>

                content = `
                    <div class="bg-white p-8 rounded-2xl shadow-xl border-t-8 border-emerald-600 animate-fade-in">
                        <h3 class="font-black mb-6 text-emerald-900 uppercase italic tracking-tighter">Garden Registry</h3>
                        <div class="flex gap-2 mb-6">

                            <button onclick="addParty()" class="bg-emerald-600 text-white px-6 py-3 rounded-xl font-black text-xl shadow-md hover:bg-emerald-700 transition">+</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 max-h-96 overflow-y-auto pr-2">
                            ${db.parties.sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`
                                <div class="text-[10px] flex justify-between items-center p-4 bg-slate-50 rounded-xl font-black tracking-tight border border-slate-100">
                                    <span class="truncate text-sm">${p.name}</span>
                                    <button onclick="deleteParty('${p.id}')" class="text-red-400 hover:text-red-600 ml-2 text-lg">×</button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-8 pt-6 border-t border-slate-100">
                            <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Restore Database from File</label>
                            <input type="file" onchange="importDatabase(event)" class="text-xs file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer transition">
                        </div>
                    </div>`;
            } else if (section === 'settings') {
                content = `
                    <div class="bg-white p-8 rounded-2xl shadow-xl border-t-8 border-purple-600 animate-fade-in">
                        <h3 class="font-black mb-6 text-purple-900 uppercase italic tracking-tight">System Settings</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 mb-3 uppercase">Company Name (Main Header)</label>
                                <input type="text" id="sCompanyName" value="${db.settings.companyName}" class="w-full p-3 border-2 border-purple-200 focus:border-purple-500 outline-none rounded-xl font-bold text-sm transition" placeholder="Company/System Name">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 mb-3 uppercase">Challan Title</label>
                                <input type="text" id="sChallanTitle" value="${db.settings.challanTitle}" class="w-full p-3 border-2 border-purple-200 focus:border-purple-500 outline-none rounded-xl font-bold text-sm transition" placeholder="e.g., SUPPLIER DELIVERY CHALLAN">

                                <label class="block text-[10px] font-black text-slate-400 mb-3 uppercase">Footer Text (Optional)</label>
                                <input type="text" id="sFooterText" value="${db.settings.footerText || ''}" class="w-full p-3 border-2 border-purple-200 focus:border-purple-500 outline-none rounded-xl font-bold text-sm transition" placeholder="e.g., Company Registration No.">

        // --- Logic Handlers ---

        function handleSetup() {
            const name = document.getElementById('mName').value.trim();
            const id = document.getElementById('mId').value.trim().toUpperCase(); 
            const pass = document.getElementById('mPass').value.trim();
            if(!name || !id || !pass) return toast("Complete all fields", "error");
            db.users = [{id, name, role:'master', password:pass}];
            saveDB();
            toast("Admin Created! Please login.");
            view = 'login'; render();
        }

        function handleLogin() {
            const id = document.getElementById('lId').value.trim().toUpperCase(); 
            const pass = document.getElementById('lPass').value.trim();
            const user = db.users.find(u => u.id === id && u.password === pass);
            if(user) {
                currentUser = user;
                sessionStorage.setItem('teaAppUserId', id);
                // Set default section based on user role
                currentSection = user.role === 'master' ? 'dashboard' : 'reports';
                view = user.role; render();
            } else { document.getElementById('lErr').textContent = "INVALID USER ID OR PASSWORD"; }
        }

        function logout() { stopScanner(); sessionStorage.clear(); view='login'; render(); }

        function generateRandomSerial() {
            let serial;
            let isUnique = false;
            while(!isUnique) {
                serial = Math.floor(Math.random() * 900000) + 100000; 
                isUnique = !db.samples.some(s => s.sampleSerialNo === serial);
            }
            return serial;
        }

        // --- Workflow Steps ---

        function submitSample() {
            const veh = document.getElementById('vNo').value.trim(); 
            const garden = document.getElementById('pName').value;
            const gross = parseFloat(document.getElementById('gWeight').value);

            if(!veh || !garden || isNaN(gross)) return toast("Fill Garden, Vehicle and Weight", "error");

            const serial = generateRandomSerial();
            const sample = {
                id: crypto.randomUUID(),
                sampleSerialNo: serial,
                vehicleNo: veh,
                partyName: garden,
                grossLoadedWeight: gross,
                status: 'pending_qc',
                createdAt: new Date().toISOString(),
                createdBy: currentUser.id
            };
            db.samples.push(sample);
            saveDB();
            showQR(serial);
            render();
        }

        function openFlcModal(sampleId, qcMode = 'Manual Entry') {
            const s = db.samples.find(x => x.id === sampleId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-orange-500">
                    <h3 class="font-black text-xl mb-1 text-orange-900 uppercase italic">Lab Analysis</h3>
                    <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Sample # ${s.sampleSerialNo} // ${s.partyName}</p>
                    <p class="text-[10px] font-bold text-blue-600 mb-6 uppercase">📊 Mode: ${qcMode}</p>
                    
                    <div class="space-y-4 mb-6">
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase">FLC Percentage %</label>
                            <input type="number" id="fPct" step="0.01" class="w-full p-4 border-2 rounded-xl text-2xl font-black text-orange-700 outline-none" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase">Moisture Deduction %</label>
                            <input type="number" id="mPct" step="0.01" class="w-full p-4 border-2 rounded-xl text-2xl font-black text-orange-700 outline-none" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase">Damage Leaf %</label>
                            <input type="number" id="dPct" step="0.01" class="w-full p-4 border-2 rounded-xl text-2xl font-black text-orange-700 outline-none" placeholder="0.00">
                        </div>
                    </div>
                    <button onclick="submitQC('${s.id}', '${qcMode}', this.closest('.modal'))" class="w-full bg-orange-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl">SAVE ANALYSIS</button>
                    <button onclick="this.closest('.modal').remove()" class="w-full text-slate-400 font-bold mt-4 text-xs uppercase hover:text-slate-600">Cancel</button>
                </div>`;
            document.body.appendChild(modal);
            setTimeout(() => document.getElementById('fPct').focus(), 300);
        }

        function submitQC(id, qcMode = 'Manual Entry', modal) {
            const f = parseFloat(document.getElementById('fPct').value) || 0;
            const m = parseFloat(document.getElementById('mPct').value) || 0;
            const d = parseFloat(document.getElementById('dPct').value) || 0;

            const idx = db.samples.findIndex(s=>s.id===id);
            db.samples[idx] = {
                ...db.samples[idx], 
                flcPercent: f, 
                moistureDeduction: m, 
                damagedLeaf: d, 
                status: 'awaiting_final_weight', 
                qcAnalyst: currentUser.id,
                qcMode: qcMode
            };
            saveDB();
            modal.remove();
            toast("Analysis Saved - Pending Tare Weight");
            render();
        }

        function openFinalWeightModal(sampleId) {
            const s = db.samples.find(x => x.id === sampleId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-indigo-600">
                    <h3 class="font-black text-xl mb-1 text-indigo-900 uppercase">Final Tare Weight</h3>
                    <p class="text-[10px] font-bold text-slate-400 mb-6 uppercase">Sample # ${s.sampleSerialNo} // Veh: ${s.vehicleNo}</p>
                    
                    <div class="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Gross Loaded Weight</p>
                        <p class="text-2xl font-black text-slate-800">${s.grossLoadedWeight} Kgs</p>
                    </div>

                    <div class="mb-8">
                        <label class="text-[10px] font-black text-slate-500 uppercase">Empty Vehicle Weight (Kgs)</label>
                        <input type="number" id="eWeight" class="w-full p-4 border-2 rounded-xl text-3xl font-black text-indigo-700 outline-none" placeholder="0.00">
                    </div>
                    
                    <button onclick="submitFinalWeight('${s.id}', this.closest('.modal'))" class="w-full bg-indigo-700 text-white py-5 rounded-2xl font-black text-lg shadow-xl uppercase hover:bg-indigo-800">Complete Entry</button>
                    <button onclick="this.closest('.modal').remove()" class="w-full text-slate-400 font-bold mt-4 text-xs uppercase underline hover:text-slate-600">Cancel</button>
                </div>`;
            document.body.appendChild(modal);
            setTimeout(() => document.getElementById('eWeight').focus(), 300);
        }

        function submitFinalWeight(id, modal) {
            const tare = parseFloat(document.getElementById('eWeight').value);
            if(isNaN(tare)) return toast("Enter valid weight", "error");

            const idx = db.samples.findIndex(s=>s.id===id);
            const s = db.samples[idx];
            
            const netLeaf = s.grossLoadedWeight - tare;
            const finalWt = netLeaf * (1 - ((s.moistureDeduction + s.damagedLeaf) / 100));

            db.samples[idx] = {
                ...s, 
                emptyVehicleWeight: tare,
                netWeight: netLeaf,
                finalCalculatedWeight: parseFloat(finalWt.toFixed(2)),
                status: 'complete',
                completedAt: new Date().toISOString(),
                completedBy: currentUser.id
            };
            saveDB();
            modal.remove();
            toast("Report Completed Successfully");
            
            setTimeout(() => showChallan(db.samples[idx]), 300);
            render();
        }

        // --- QR Features ---

        function showQR(serial) {
            const sample = db.samples.find(s => s.sampleSerialNo === serial);
            const modal = document.createElement('div');
            modal.className = 'modal'; 
            modal.innerHTML = `
                <div class="bg-white p-10 rounded-3xl shadow-2xl text-center border-4 border-blue-600 printable-area">
                    <h2 class="font-black text-2xl mb-1 text-blue-900 uppercase">Sample Bag Tag</h2>
                    <p class="text-slate-400 font-bold mb-6 tracking-widest italic uppercase">Serial # ${serial}</p>

        // --- Download Challan Function ---
        function downloadChallan(sample) {
            const challanDiv = document.querySelector('.challan-printable');
            if (!challanDiv) return toast('Challan not found', 'error');
            
            const entryDate = new Date(sample.createdAt).toLocaleDateString('en-IN').replace(/\//g, '-');
            const filename = `CHALLAN_${sample.partyName.replace(/\s+/g, '_')}_${entryDate}.pdf`;
            
            html2canvas(challanDiv, {
                scale: 2,
                backgroundColor: '#ffffff',
                logging: false,
                useCORS: true
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'landscape',
                    unit: 'mm',
                    format: [210, 99] // A6 landscape dimensions
                });
                
                // Calculate dimensions to fit the challan perfectly
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                pdf.save(filename);
                toast('Challan Downloaded Successfully');
            }).catch(err => {
                toast('Download failed: ' + err.message, 'error');
            });
        }

            const modal = document.createElement('div');

                    <div id="reader"></div>
                </div>`;
            document.body.appendChild(modal);

            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (decodedText) => {
                const serial = parseInt(decodedText);
                const sample = db.samples.find(s => s.sampleSerialNo === serial);
                if(sample) {
                    stopScanner();
                    if(targetRole === 'analyst' && sample.status === 'pending_qc') openFlcModal(sample.id, 'QR Scan');
                    else if(targetRole === 'clerk' && sample.status === 'awaiting_final_weight') openFinalWeightModal(sample.id);
                    else toast("Sample state not correct for this scan", "error");
                } else { toast("Tag not recognized", "error"); }
            });
        }

        function stopScanner() {
            if(html5QrCode) {
                html5QrCode.stop().finally(() => {

        function saveEdit(id, modal) {
            const party = document.getElementById('editParty').value;
            const vehicle = document.getElementById('editVehicle').value.trim();
            const gross = parseFloat(document.getElementById('editGross').value);
            const empty = parseFloat(document.getElementById('editEmpty').value) || 0;
            const flc = parseFloat(document.getElementById('editFlc').value) || 0;
            const moisture = parseFloat(document.getElementById('editMoisture').value) || 0;
            const damage = parseFloat(document.getElementById('editDamage').value) || 0;

            if (!party || !vehicle || isNaN(gross)) return toast("Fill required fields", "error");

            const idx = db.samples.findIndex(s => s.id === id);
            const s = db.samples[idx];
            db.samples[idx] = {
                ...s,
                partyName: party,
                vehicleNo: vehicle,
                grossLoadedWeight: gross,
                emptyVehicleWeight: empty,
                flcPercent: flc,
                moistureDeduction: moisture,
                damagedLeaf: damage,
            };

            if (s.status === 'complete') {
                const netLeaf = gross - empty;
                const finalWt = netLeaf * (1 - ((moisture + damage) / 100));
                db.samples[idx].netWeight = netLeaf;
                db.samples[idx].finalCalculatedWeight = parseFloat(finalWt.toFixed(2));
            }

            saveDB();
            modal.remove();
            toast("Sample updated successfully");
            render();
        }

        function getFilteredSamples() {
            let s = db.samples.filter(x=>x.status==='complete');
            const dateFrom = document.getElementById('fDateFrom')?.value;
            const dateTo = document.getElementById('fDateTo')?.value;
            
            if(dateFrom) {
                const fromDate = new Date(dateFrom + 'T00:00:00');
                const toDate = dateTo ? new Date(dateTo + 'T23:59:59') : new Date(dateFrom + 'T23:59:59');
                s = s.filter(x => {
                    const sampleDate = new Date(x.createdAt);
                    return sampleDate >= fromDate && sampleDate <= toDate;
                });
            }

            if(searchQuery) {
                s = s.filter(x => 
                    x.sampleSerialNo.toString().includes(searchQuery) ||
                    x.partyName.toLowerCase().includes(searchQuery) ||
                    x.vehicleNo.toLowerCase().includes(searchQuery)
                );
            }

            const partyFilter = document.getElementById('partyFilter')?.value;
            if(partyFilter) {
                s = s.filter(x => x.partyName === partyFilter);
            }
            
            return s.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
        }

        function downloadCSV() {
            const s = getFilteredSamples();
            if(!s.length) return toast("No completed reports to export", "error");
            
            const dateFrom = document.getElementById('fDateFrom')?.value || 'all';
            const dateTo = document.getElementById('fDateTo')?.value || 'all';
            const dateRange = dateFrom !== 'all' ? `${dateFrom}_to_${dateTo}` : 'all_data';
            const partyFilter = document.getElementById('partyFilter')?.value || 'all';
            
            const head = "Date,Serial,Garden,Vehicle,Gross Loaded,Empty Vehicle,Net Leaf,FLC%,Moisture%,Damage%,Final Weight,Entry Clerk,QC Analyst,QC Mode\n";
            const body = s.map(x=>{
                return `${new Date(x.createdAt).toLocaleDateString()},${x.sampleSerialNo},${x.partyName},${x.vehicleNo},${x.grossLoadedWeight},${x.emptyVehicleWeight},${x.netWeight},${x.flcPercent},${x.moistureDeduction},${x.damagedLeaf},${x.finalCalculatedWeight},"${x.createdBy || ''}","${x.qcAnalyst || ''}","${x.qcMode || 'Manual Entry'}"`;
            }).join('\n');
            const blob = new Blob([head+body], {type:'text/csv'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href=url; a.download=`flc_report_${partyFilter}_${dateRange}.csv`; a.click();
            toast(`Downloaded ${partyFilter} data - ${s.length} records`);
        }

            printerSelect.innerHTML = '<option value="">-- System Default Printer --</option>';
            knownPrinters.forEach(printer => {
                const option = document.createElement('option');
                option.value = printer;
                option.textContent = printer;
                printerSelect.appendChild(option);
            });
        }

        function switchProfile(button, profileName, profilesJson) {
            const printProfiles = JSON.parse(profilesJson);
            document.querySelectorAll('.profile-tab').forEach(b => {
                b.classList.remove('active', 'border-b-4', 'border-blue-600', 'text-blue-700', 'bg-blue-50', 'rounded-t-xl');
                b.classList.add('text-slate-500');
            });
            button.classList.add('active', 'border-b-4', 'border-blue-600', 'text-blue-700', 'bg-blue-50', 'rounded-t-xl');
            button.classList.remove('text-slate-500');
            loadProfileSettings(profileName, printProfiles);
        }

        function loadProfileSettings(profileName, printProfiles) {
            const profile = printProfiles[profileName] || getDefaultPrintProfiles()[profileName];
            document.getElementById('psPrinterName').value = profile.printerName || '';
            document.getElementById('psPaperSize').value = profile.paperSize;
            document.getElementById('psOrientation').value = profile.orientation;
            document.getElementById('psMarginTop').value = profile.marginTop;
            document.getElementById('psMarginRight').value = profile.marginRight;
            document.getElementById('psMarginBottom').value = profile.marginBottom;
            document.getElementById('psMarginLeft').value = profile.marginLeft;
            document.getElementById('psFontSize').value = profile.fontSize;
            document.getElementById('psHeaderFooter').value = profile.headerFooter;
            document.getElementById('psCopies').value = profile.copies || '1';
            
            let infoColor = 'blue';
            let emoji = '📄';
            if(profileName === 'barcode') {
                infoColor = 'blue';
                emoji = '🏷️';
            } else if(profileName === 'challan') {
                infoColor = 'green';
                emoji = '🧾';
            } else {
                infoColor = 'emerald';
                emoji = '📄';
            }
            
            document.getElementById('profileInfo').className = `bg-${infoColor}-50 border-2 border-${infoColor}-200 rounded-xl p-4 flex flex-col justify-center`;
            const printerDisplay = profile.printerName ? `Printer: ${profile.printerName}` : 'Printer: System Default';
            document.getElementById('profileInfo').innerHTML = `<div class="text-xs font-bold text-slate-600 space-y-2">
                <p><span class="font-black text-${infoColor}-700">${emoji}</span> Profile: ${profile.name || profileName}</p>
                <p><span class="font-black text-${infoColor}-700">🖨️</span> ${printerDisplay}</p>
                <p><span class="font-black text-${infoColor}-700">✓</span> Auto-applied to matching prints</p>
                <p><span class="font-black text-${infoColor}-700">✓</span> No printer selection dialog</p>
            </div>`;
            
            document.getElementById('previewEmoji').textContent = emoji;
            loadPrintPreview();
        }

        function loadPrintPreview() {
            const size = document.getElementById('psPaperSize')?.value || 'A4';
            const orientation = document.getElementById('psOrientation')?.value || 'portrait';
            const marginTop = document.getElementById('psMarginTop')?.value || '10';

            document.getElementById('previewSize').textContent = `Size: ${size}`;
            document.getElementById('previewOrientation').textContent = `Mode: ${orientation.charAt(0).toUpperCase() + orientation.slice(1)}`;
            document.getElementById('previewMargins').textContent = `Margins: ${marginTop}mm`;
        }

        function getCurrentProfileSettings() {
            return {
                printerName: document.getElementById('psPrinterName')?.value || '',
                paperSize: document.getElementById('psPaperSize')?.value || 'A4',
                orientation: document.getElementById('psOrientation')?.value || 'portrait',
                marginTop: document.getElementById('psMarginTop')?.value || '10',
                marginRight: document.getElementById('psMarginRight')?.value || '10',
                marginBottom: document.getElementById('psMarginBottom')?.value || '10',
                marginLeft: document.getElementById('psMarginLeft')?.value || '10',
                fontSize: document.getElementById('psFontSize')?.value || '12',
                headerFooter: document.getElementById('psHeaderFooter')?.value || 'on',
                copies: document.getElementById('psCopies')?.value || '1'
            };
        }

        function saveBothProfiles(modal) {
            const printProfiles = JSON.parse(localStorage.getItem('printProfiles')) || getDefaultPrintProfiles();
            const currentSettings = getCurrentProfileSettings();
            const activeTab = document.querySelector('.profile-tab.active').textContent;
            
            if(activeTab.includes('BARCODE')) {
                printProfiles.barcode = { ...printProfiles.barcode, ...currentSettings };
            } else if (activeTab.includes('CHALLAN')) {
                printProfiles.challan = { ...printProfiles.challan, ...currentSettings };
            } else {
                printProfiles.general = { ...printProfiles.general, ...currentSettings };
            }
            
            localStorage.setItem('printProfiles', JSON.stringify(printProfiles));
            applyPrintStyleByProfile('general');
            modal.remove();
            toast('Print Profile Saved Successfully');
        }

        function resetAllProfiles(modal) {
            const defaults = getDefaultPrintProfiles();
            localStorage.setItem('printProfiles', JSON.stringify(defaults));
            loadProfileSettings('barcode', defaults);
            applyPrintStyleByProfile('general');
            toast("All Profiles Reset to Defaults");
        }

        function applyPrintStyleByProfile(profileType) {
            let printProfiles = JSON.parse(localStorage.getItem('printProfiles'));
            const defaults = getDefaultPrintProfiles();
            
            if(!printProfiles) {
                printProfiles = defaults;
            } else {
                printProfiles = { ...defaults, ...printProfiles };
                
                // Migration: Update old challan profile to use correct A6 dimensions
                if (printProfiles.challan && printProfiles.challan.paperSize === 'A4') {
                    printProfiles.challan = {
                        ...printProfiles.challan,
                        name: 'Challan Receipt (A6 Landscape)',
                        paperSize: '210mm 99mm',
                        orientation: 'landscape'
                    };
                    localStorage.setItem('printProfiles', JSON.stringify(printProfiles));
                }
            }
            
            const settings = printProfiles[profileType];
            if(!settings) return;
            
            let styleId = `dynamicPrintStyles_${profileType}`;
            let style = document.getElementById(styleId);
            if(!style) {
                style = document.createElement('style');
                style.id = styleId;
                document.head.appendChild(style);
            }

            style.textContent = `
                @page {
                    size: ${settings.paperSize} ${settings.orientation};
                    margin: ${settings.marginTop}mm ${settings.marginRight}mm ${settings.marginBottom}mm ${settings.marginLeft}mm;
                }
                @media print {
                    body { font-size: ${settings.fontSize}pt; }
                    .challan-printable {
                        page-break-inside: avoid !important;
                        page-break-before: avoid !important;
                        page-break-after: avoid !important;
                        height: 99mm !important;
                        max-height: 99mm !important;
                        overflow: hidden !important;
                        width: 210mm !important;
                        max-width: 210mm !important;
                    }
                    body, html {
                        height: auto !important;
                        max-height: 99mm !important;
                        width: 210mm !important;
                        max-width: 210mm !important;
                        margin: 0 !important;
                        padding: 0 !important;
                        overflow: hidden !important;
                    }
                    * {
                        -webkit-print-color-adjust: exact !important;
                        color-adjust: exact !important;
                    }
                }
            `;
        }

        function initPrintSettings() {
            const saved = localStorage.getItem('printProfiles');
            if(saved) {
                applyPrintStyleByProfile('general');
            } else {
                localStorage.setItem('printProfiles', JSON.stringify(getDefaultPrintProfiles()));
                applyPrintStyleByProfile('general');
            }
        }
        
        function applyPrintProfile(profileType) {
            const printProfiles = JSON.parse(localStorage.getItem('printProfiles')) || getDefaultPrintProfiles();
            const profile = printProfiles[profileType] || getDefaultPrintProfiles()[profileType];
            const copies = parseInt(profile.copies) || 1;

            applyPrintStyleByProfile(profileType);

            // Print multiple copies with delay between each
            for (let i = 0; i < copies; i++) {
                setTimeout(() => {
                    window.print();
                }, i * 1000); // 1 second delay between copies
            }
        }

        function refreshPrinterList() {
            const printerSelect = document.getElementById('psPrinterName');
            
            if(!navigator.permissions || !navigator.permissions.query) {
                toast('Printer detection not available in this browser', 'error');
                return;
            }
            
            const knownPrinters = JSON.parse(localStorage.getItem('knownPrinters')) || [];
            printerSelect.innerHTML = '<option value="">-- System Default Printer --</option>';
            
            knownPrinters.forEach(printer => {
                const exists = Array.from(printerSelect.options).some(o => o.value === printer);
                if(!exists) {
                    const option = document.createElement('option');
                    option.value = printer;
                    option.textContent = printer;
                    printerSelect.appendChild(option);
                }
            });

            addPrinterManually();
        }

        function addPrinterManually() {
            const printerName = prompt('Enter your printer name (or leave blank):\\n\\nExamples:\\n- Xerox Printer\\n- HP LaserJet Pro\\n- Canon MF445\\n- Brother HL-L8360');
            
            if(printerName !== null && printerName.trim() !== '') {
                const trimmedName = printerName.trim();
                const printerSelect = document.getElementById('psPrinterName');
                
                const exists = Array.from(printerSelect.options).some(o => o.value === trimmedName);
                if(!exists) {
                    const option = document.createElement('option');
                    option.value = trimmedName;
                    option.textContent = trimmedName;
                    printerSelect.appendChild(option);
                    
                    const knownPrinters = JSON.parse(localStorage.getItem('knownPrinters')) || [];
                    if(!knownPrinters.includes(trimmedName)) {
                        knownPrinters.push(trimmedName);
                        localStorage.setItem('knownPrinters', JSON.stringify(knownPrinters));
                    }
                }
                
                printerSelect.value = trimmedName;
                toast('Printer added: ' + trimmedName);
            }
        }

        loadDB();
        initPrintSettings();
        render();
    </script>
</body>
</html>
