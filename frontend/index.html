<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tea Leaf FLC Quality Control System</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {}
      }
    }
  </script>

  <!-- Libraries for QR Generation and Scanning -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 1rem;
    }

    #reader {
      width: 100% !important;
      border: none !important;
    }

    #reader video {
      border-radius: 12px;
    }

    /* PRINTING FIX: Hides everything by default, shows only the printable area */
    @media print {
      body * {
        visibility: hidden;
      }

      .printable-area,
      .printable-area * {
        visibility: visible;
      }

      .printable-area {
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: white;
        z-index: 9999;
        border: none !important;
        box-shadow: none !important;
      }

      .no-print {
        display: none !important;
      }
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
