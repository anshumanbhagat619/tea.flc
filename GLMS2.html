<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Leaf FLC Quality Control System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Libraries for QR Generation and Scanning -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
        #reader { width: 100% !important; border: none !important; }
        #reader video { border-radius: 12px; }
        
        /* PRINTING FIX: Hides everything by default, shows only the printable area */
        @media print { 
            body * { visibility: hidden; }
            .printable-area, .printable-area * { visibility: visible; }
            .printable-area { 
                position: fixed; 
                left: 0; 
                top: 0; 
                width: 100%; 
                height: 100%; 
                display: flex; 
                flex-direction: column;
                align-items: center; 
                justify-content: center; 
                background: white; 
                z-index: 9999;
                border: none !important;
                box-shadow: none !important;
            }
            .no-print { display: none !important; } 
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app"></div>

    <script>
        let db = { users: [], parties: [], samples: [], counters: { samples: 0 } };
        let currentUser = null;
        let view = 'login';
        let html5QrCode = null;

        // --- Database Management ---
        function loadDB() {
            const stored = localStorage.getItem('teaAppDb');
            if (stored) {
                db = JSON.parse(stored);
                const savedUserId = sessionStorage.getItem('teaAppUserId');
                if (savedUserId) {
                    const user = db.users.find(u => u.id === savedUserId);
                    if (user) { currentUser = user; view = user.role; }
                }
            } else { view = 'setup'; }
        }

        function saveDB() {
            localStorage.setItem('teaAppDb', JSON.stringify(db));
        }

        function exportDatabase() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `tea_flc_backup_${new Date().toISOString().slice(0,10)}.json`);
            dl.click();
            toast("Database Backup Saved to Downloads");
        }

        function importDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.users) {
                        db = imported;
                        saveDB();
                        toast("Data Restored Successfully!");
                        setTimeout(() => location.reload(), 1000);
                    }
                } catch (err) { toast("Error: Invalid Backup File", "error"); }
            };
            reader.readAsText(file);
        }

        // --- UI Utilities ---
        function toast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `fixed bottom-5 right-5 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white py-3 px-6 rounded-xl shadow-2xl z-[100] font-bold`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function render() {
            const app = document.getElementById('app');
            if (view === 'setup') renderSetup(app);
            else if (view === 'login') renderLogin(app);
            else renderMainApp(app);
        }

        function renderSetup(app) {
            // REMOVED 'uppercase' class from inputs below
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4 bg-green-50">
                    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
                        <h1 class="text-2xl font-black text-center mb-2 text-green-800 uppercase">System Setup</h1>
                        <p class="text-sm text-gray-500 mb-8 text-center">Create the first Admin (Master) ID.</p>
                        <div class="space-y-4">
                            <input type="text" id="mName" placeholder="Full Name" class="w-full px-4 py-3 border-2 rounded-xl">
                            <input type="text" id="mId" placeholder="Create Admin User ID" class="w-full px-4 py-3 border-2 rounded-xl font-mono">
                            <input type="password" id="mPass" placeholder="Set Password" class="w-full px-4 py-3 border-2 rounded-xl">
                            <button onclick="handleSetup()" class="w-full bg-green-700 text-white py-4 rounded-xl font-black text-lg">ACTIVATE SYSTEM</button>
                        </div>
                    </div>
                </div>`;
        }

        function renderLogin(app) {
            // REMOVED 'uppercase' class from inputs below
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4 bg-slate-100">
                    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md border-t-8 border-green-700">
                        <h1 class="text-3xl font-black text-center mb-8 text-slate-800 tracking-tight">TEA LEAF FLC</h1>
                        <div class="space-y-4">
                            <input type="text" id="lId" placeholder="USER ID" class="w-full px-4 py-4 border-2 rounded-xl font-mono text-lg outline-none focus:border-green-500">
                            <input type="password" id="lPass" placeholder="PASSWORD" class="w-full px-4 py-4 border-2 rounded-xl text-lg outline-none focus:border-green-500" onkeypress="if(event.key==='Enter')handleLogin()">
                            <button onclick="handleLogin()" class="w-full bg-green-700 text-white py-4 rounded-xl font-black text-lg shadow-lg">SIGN IN</button>
                            <p id="lErr" class="text-red-600 text-center font-bold mt-2"></p>
                        </div>
                    </div>
                </div>`;
        }

        function renderMainApp(app) {
            let clerkSection = '';
            let analystSection = '';

            if (currentUser.role === 'clerk') {
                const pendingFinal = db.samples.filter(s => s.status === 'awaiting_final_weight');
                // REMOVED 'uppercase' class from inputs below
                clerkSection = `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-8 border-blue-500">
                            <h2 class="text-xl font-black mb-4 text-blue-900 uppercase">1. Initial Entry (Gross)</h2>
                            <div class="space-y-4">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <input type="text" id="vNo" placeholder="Vehicle No" maxlength="15" class="w-full px-4 py-3 border-2 rounded-xl font-mono">
                                    <select id="pName" class="w-full px-4 py-3 border-2 rounded-xl bg-white text-sm font-bold">
                                        <option value="">Select Garden</option>
                                        ${db.parties.sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}
                                    </select>
                                </div>
                                <input type="number" id="gWeight" placeholder="Gross Loaded Weight (Kgs)" class="w-full px-4 py-3 border-2 rounded-xl font-black text-xl text-blue-700">
                                <button onclick="submitSample()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg">GENERATE TAG</button>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-8 border-indigo-600">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-xl font-black text-indigo-900 uppercase">2. Final Weight</h2>
                                <button onclick="startScanner('clerk')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-xs">SCAN TAG</button>
                            </div>
                            <p class="text-xs text-gray-400 mb-4 uppercase font-bold">Samples waiting for tare weight: ${pendingFinal.length}</p>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                ${pendingFinal.map(s => `<button onclick="openFinalWeightModal('${s.id}')" class="p-3 bg-indigo-50 border border-indigo-100 rounded-xl font-black text-indigo-700 text-sm"># ${s.sampleSerialNo}</button>`).join('')}
                            </div>
                        </div>
                    </div>`;
            } else if (currentUser.role === 'analyst') {
                const pendingQC = db.samples.filter(s => s.status === 'pending_qc');
                analystSection = `
                    <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 border-l-8 border-orange-500">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-black text-orange-900 uppercase tracking-tight">Quality Lab Entry</h2>
                            <button onclick="startScanner('analyst')" class="bg-orange-600 text-white px-6 py-3 rounded-xl font-black shadow-lg flex items-center gap-2 tracking-widest">
                                SCAN SAMPLE QR
                            </button>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                            ${pendingQC.length === 0 ? '<p class="col-span-full text-center py-10 text-gray-300 font-bold bg-gray-50 rounded-xl">NO SAMPLES PENDING IN LAB</p>' : 
                              pendingQC.map(s=>`<button onclick='openFlcModal("${s.id}")' class="p-4 bg-orange-50 border-2 border-orange-100 rounded-xl text-center font-black text-orange-700 hover:scale-105 transition"># ${s.sampleSerialNo}</button>`).join('')}
                        </div>
                    </div>`;
            }

            app.innerHTML = `
                <header class="bg-slate-900 text-white p-5 shadow-2xl mb-6 sticky top-0 z-40 no-print">
                    <div class="max-w-7xl mx-auto flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center font-black italic shadow-inner">TEA</div>
                            <div>
                                <h1 class="text-lg font-black uppercase tracking-tighter">Factory Quality System</h1>
                                <p class="text-[10px] font-bold text-green-400 uppercase tracking-widest">${currentUser.name} // ${currentUser.role}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="exportDatabase()" class="bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg font-bold text-xs">BACKUP</button>
                            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-2 rounded-lg font-black text-xs">EXIT</button>
                        </div>
                    </div>
                </header>
                <main class="max-w-7xl mx-auto px-4 pb-20">
                    ${clerkSection}
                    ${analystSection}
                    
                    <!-- Daily Reports Table -->
                    <div class="bg-white rounded-2xl shadow-md p-6 overflow-hidden">
                        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                            <h2 class="text-lg font-black text-slate-800 uppercase italic">Daily Quality Summary</h2>
                            <div class="flex gap-2 w-full md:w-auto">
                                <input type="date" id="fDate" value="${new Date().toISOString().split('T')[0]}" onchange="render()" class="border-2 p-2 rounded-xl text-xs font-bold focus:border-green-500">
                                <button onclick="downloadCSV()" class="bg-emerald-600 text-white px-6 py-2 rounded-xl text-xs font-black shadow-md">DOWNLOAD CSV</button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest">
                                    <tr><th class="p-4">Serial</th><th class="p-4">Garden/Transport</th><th class="p-4">Weight Breakup</th><th class="p-4">QC Data</th><th class="p-4 text-green-700 font-black">Final Weight</th>${currentUser.role==='master'?'<th class="p-4">Action</th>':''}</tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    ${getFilteredSamples().map(s=>`
                                        <tr class="hover:bg-slate-50/50 transition">
                                            <td class="p-4 font-black text-slate-400">#${s.sampleSerialNo}</td>
                                            <td class="p-4">
                                                <div class="font-black text-slate-800">${s.partyName}</div>
                                                <div class="text-[10px] font-mono text-slate-400">${s.vehicleNo}</div>
                                            </td>
                                            <td class="p-4 leading-tight">
                                                <div class="text-xs text-slate-500">Gross: ${s.grossLoadedWeight} Kgs</div>
                                                <div class="text-xs text-slate-500 italic">Empty: ${s.emptyVehicleWeight || 0} Kgs</div>
                                                <div class="font-bold text-slate-700 underline">Net: ${s.netWeight || 0} Kgs</div>
                                            </td>
                                            <td class="p-4 leading-tight">
                                                <div class="text-[10px] font-bold">FLC: ${s.flcPercent}%</div>
                                                <div class="text-[10px] text-slate-500 mt-1">Moisture: ${s.moistureDeduction}%</div>
                                                <div class="text-[10px] text-slate-500">Damage: ${s.damagedLeaf}%</div>
                                                <div class="text-[10px] text-orange-600 font-bold mt-1">Total: ${(s.moistureDeduction + s.damagedLeaf).toFixed(2)}%</div>
                                            </td>
                                            <td class="p-4">
                                                <div class="text-lg font-black text-green-700">${s.finalCalculatedWeight || 0} <span class="text-[10px] font-normal">Kgs</span></div>
                                            </td>
                                            ${currentUser.role==='master'?`<td class="p-4"><button onclick="deleteSample('${s.id}')" class="text-red-200 hover:text-red-500 transition">DEL</button></td>`:''}
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    ${currentUser.role==='master' ? renderAdmin() : ''}
                </main>`;
        }

        function renderAdmin() {
            // REMOVED 'uppercase' class from inputs below
            return `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-10">
                    <div class="bg-white p-8 rounded-2xl shadow-xl border-t-8 border-indigo-600">
                        <h3 class="font-black mb-6 text-indigo-900 uppercase italic">Staff Management</h3>
                        <div class="space-y-4 mb-8">
                            <input type="text" id="nuName" placeholder="Full Name" class="w-full p-3 border-2 rounded-xl">
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" id="nuId" placeholder="User ID (Login ID)" class="w-full p-3 border-2 rounded-xl font-mono">
                                <input type="text" id="nuPass" placeholder="Password" class="w-full p-3 border-2 rounded-xl">
                            </div>
                            <select id="nuRole" class="w-full p-3 border-2 rounded-xl bg-white font-bold">
                                <option value="clerk">Entry Clerk</option>
                                <option value="analyst">QC Analyst</option>
                                <option value="viewer">Viewer</option>
                                <option value="master">Admin</option>
                            </select>
                            <button onclick="addUser()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-lg">REGISTER STAFF</button>
                        </div>
                        <div class="space-y-2 max-h-60 overflow-y-auto pr-2">
                            ${db.users.map(u=>`<div class="text-xs bg-slate-50 p-4 rounded-xl flex justify-between items-center">
                                <div><div class="font-black text-indigo-900">${u.id} <span class="font-normal text-slate-400 lowercase">(${u.role})</span></div><div class="text-[10px] text-slate-400 font-bold uppercase">${u.name} // Pass: ${u.password}</div></div>
                                <button onclick="deleteUser('${u.id}')" class="text-red-300 hover:text-red-500 font-black">REMOVE</button>
                            </div>`).join('')}
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-2xl shadow-xl border-t-8 border-emerald-600">
                        <h3 class="font-black mb-6 text-emerald-900 uppercase italic tracking-tighter">Garden Registry</h3>
                        <div class="flex gap-2 mb-6">
                            <input type="text" id="npName" placeholder="NEW GARDEN NAME" class="flex-grow p-3 border-2 rounded-xl font-bold text-sm">
                            <button onclick="addParty()" class="bg-emerald-600 text-white px-6 py-3 rounded-xl font-black text-xl shadow-md">+</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-96 overflow-y-auto pr-2">
                            ${db.parties.sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`
                                <div class="text-[10px] flex justify-between items-center p-3 bg-slate-50 rounded-xl font-black tracking-tight">
                                    <span class="truncate">${p.name}</span>
                                    <button onclick="deleteParty('${p.id}')" class="text-red-300 hover:text-red-500 ml-2">×</button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-8 pt-4 border-t border-slate-100">
                            <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Restore Database from File</label>
                            <input type="file" onchange="importDatabase(event)" class="text-[10px]">
                        </div>
                    </div>
                </div>`;
        }

        // --- Logic Handlers ---

        function handleSetup() {
            const name = document.getElementById('mName').value.trim();
            const id = document.getElementById('mId').value.trim().toUpperCase(); // Kept upper for ID uniqueness
            const pass = document.getElementById('mPass').value.trim();
            if(!name || !id || !pass) return toast("Complete all fields", "error");
            db.users = [{id, name, role:'master', password:pass}];
            saveDB();
            toast("Admin Created! Please login.");
            view = 'login'; render();
        }

        function handleLogin() {
            const id = document.getElementById('lId').value.trim().toUpperCase(); // Kept upper for ID logic
            const pass = document.getElementById('lPass').value.trim();
            const user = db.users.find(u => u.id === id && u.password === pass);
            if(user) {
                currentUser = user;
                sessionStorage.setItem('teaAppUserId', id);
                view = user.role; render();
            } else { document.getElementById('lErr').textContent = "INVALID USER ID OR PASSWORD"; }
        }

        function logout() { stopScanner(); sessionStorage.clear(); view='login'; render(); }

        // --- Workflow Steps ---

        // STEP 1: INITIAL SUBMISSION (CLERK)
        function submitSample() {
            const veh = document.getElementById('vNo').value.trim(); // Removed toUpperCase()
            const garden = document.getElementById('pName').value;
            const gross = parseFloat(document.getElementById('gWeight').value);

            if(!veh || !garden || isNaN(gross)) return toast("Fill Garden, Vehicle and Weight", "error");

            const serial = db.counters.samples + 1;
            const sample = {
                id: crypto.randomUUID(),
                sampleSerialNo: serial,
                vehicleNo: veh,
                partyName: garden,
                grossLoadedWeight: gross,
                status: 'pending_qc',
                createdAt: new Date().toISOString(),
                createdBy: currentUser.id
            };
            db.samples.push(sample);
            db.counters.samples = serial;
            saveDB();
            showQR(serial);
            render();
        }

        // STEP 2: QC ENTRY (ANALYST)
        function openFlcModal(sampleId) {
            const s = db.samples.find(x => x.id === sampleId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-orange-500">
                    <h3 class="font-black text-xl mb-1 text-orange-900 uppercase italic">Lab Analysis</h3>
                    <p class="text-[10px] font-bold text-slate-400 mb-6 uppercase">Sample # ${s.sampleSerialNo} // ${s.partyName}</p>
                    
                    <div class="space-y-4 mb-6">
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase">FLC Percentage %</label>
                            <input type="number" id="fPct" step="0.01" class="w-full p-4 border-2 rounded-xl text-2xl font-black text-orange-700 outline-none" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase">Moisture Deduction %</label>
                            <input type="number" id="mPct" step="0.01" class="w-full p-4 border-2 rounded-xl text-2xl font-black text-orange-700 outline-none" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase">Damage Leaf %</label>
                            <input type="number" id="dPct" step="0.01" class="w-full p-4 border-2 rounded-xl text-2xl font-black text-orange-700 outline-none" placeholder="0.00">
                        </div>
                    </div>
                    <button onclick="submitQC('${s.id}', this.closest('.modal'))" class="w-full bg-orange-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl">SAVE ANALYSIS</button>
                    <button onclick="this.closest('.modal').remove()" class="w-full text-slate-400 font-bold mt-4 text-xs uppercase">Cancel</button>
                </div>`;
            document.body.appendChild(modal);
            setTimeout(() => document.getElementById('fPct').focus(), 300);
        }

        function submitQC(id, modal) {
            const f = parseFloat(document.getElementById('fPct').value) || 0;
            const m = parseFloat(document.getElementById('mPct').value) || 0;
            const d = parseFloat(document.getElementById('dPct').value) || 0;

            const idx = db.samples.findIndex(s=>s.id===id);
            db.samples[idx] = {
                ...db.samples[idx], 
                flcPercent: f, 
                moistureDeduction: m, 
                damagedLeaf: d, 
                status: 'awaiting_final_weight', 
                qcAnalyst: currentUser.id
            };
            saveDB();
            modal.remove();
            toast("Analysis Saved - Pending Tare Weight");
            render();
        }

        // STEP 3: FINAL WEIGHT (CLERK)
        function openFinalWeightModal(sampleId) {
            const s = db.samples.find(x => x.id === sampleId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-indigo-600">
                    <h3 class="font-black text-xl mb-1 text-indigo-900 uppercase">Final Tare Weight</h3>
                    <p class="text-[10px] font-bold text-slate-400 mb-6 uppercase">Sample # ${s.sampleSerialNo} // Veh: ${s.vehicleNo}</p>
                    
                    <div class="bg-slate-50 p-4 rounded-xl mb-6">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Gross Loaded Weight</p>
                        <p class="text-2xl font-black text-slate-800">${s.grossLoadedWeight} Kgs</p>
                    </div>

                    <div class="mb-8">
                        <label class="text-[10px] font-black text-slate-500 uppercase">Empty Vehicle Weight (Kgs)</label>
                        <input type="number" id="eWeight" class="w-full p-4 border-2 rounded-xl text-3xl font-black text-indigo-700 outline-none" placeholder="0.00">
                    </div>
                    
                    <button onclick="submitFinalWeight('${s.id}', this.closest('.modal'))" class="w-full bg-indigo-700 text-white py-5 rounded-2xl font-black text-lg shadow-xl uppercase">Complete Entry</button>
                    <button onclick="this.closest('.modal').remove()" class="w-full text-slate-400 font-bold mt-4 text-xs uppercase underline">Cancel</button>
                </div>`;
            document.body.appendChild(modal);
            setTimeout(() => document.getElementById('eWeight').focus(), 300);
        }

        function submitFinalWeight(id, modal) {
            const tare = parseFloat(document.getElementById('eWeight').value);
            if(isNaN(tare)) return toast("Enter valid weight", "error");

            const idx = db.samples.findIndex(s=>s.id===id);
            const s = db.samples[idx];
            
            const netLeaf = s.grossLoadedWeight - tare;
            const finalWt = netLeaf * (1 - ((s.moistureDeduction + s.damagedLeaf) / 100));

            db.samples[idx] = {
                ...s, 
                emptyVehicleWeight: tare,
                netWeight: netLeaf,
                finalCalculatedWeight: parseFloat(finalWt.toFixed(2)),
                status: 'complete'
            };
            saveDB();
            modal.remove();
            toast("Report Completed Successfully");
            render();
        }

        // --- QR Features ---

        function showQR(serial) {
            // UPDATED: Added 'printable-area' class to the card inside the modal
            // Removed 'no-print' from the outer modal div
            const modal = document.createElement('div');
            modal.className = 'modal'; 
            modal.innerHTML = `
                <div class="bg-white p-10 rounded-3xl shadow-2xl text-center border-4 border-blue-600 printable-area">
                    <h2 class="font-black text-2xl mb-1 text-blue-900 uppercase">Sample Bag Tag</h2>
                    <p class="text-slate-400 font-bold mb-6 tracking-widest italic uppercase">Serial # ${serial}</p>
                    <div id="qrcode" class="flex justify-center p-4 bg-white border-2 border-slate-50 rounded-2xl mb-8"></div>
                    <div class="flex gap-3 no-print">
                        <button onclick="window.print()" class="flex-grow bg-blue-600 text-white py-4 px-6 rounded-2xl font-black shadow-lg">PRINT TAG</button>
                        <button onclick="this.closest('.modal').remove()" class="bg-slate-100 text-slate-500 py-4 px-6 rounded-2xl font-bold">CLOSE</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
            new QRCode(document.getElementById("qrcode"), {
                text: serial.toString(),
                width: 220, height: 220,
                colorDark : "#1e3a8a",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function startScanner(targetRole) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden border-4 border-slate-800">
                    <div class="p-4 bg-slate-900 text-white flex justify-between items-center">
                        <span class="font-black italic uppercase text-xs">Live Scanner Ready</span>
                        <button onclick="stopScanner()" class="font-black">×</button>
                    </div>
                    <div id="reader"></div>
                </div>`;
            document.body.appendChild(modal);

            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (decodedText) => {
                const serial = parseInt(decodedText);
                const sample = db.samples.find(s => s.sampleSerialNo === serial);
                if(sample) {
                    stopScanner();
                    if(targetRole === 'analyst' && sample.status === 'pending_qc') openFlcModal(sample.id);
                    else if(targetRole === 'clerk' && sample.status === 'awaiting_final_weight') openFinalWeightModal(sample.id);
                    else toast("Sample state not correct for this scan", "error");
                } else { toast("Tag not recognized", "error"); }
            });
        }

        function stopScanner() {
            if(html5QrCode) {
                html5QrCode.stop().finally(() => {
                    const m = document.querySelector('.modal');
                    if(m) m.remove();
                    html5QrCode = null;
                });
            }
        }

        // --- Helpers ---

        function addUser() {
            const n = document.getElementById('nuName').value.trim();
            const id = document.getElementById('nuId').value.trim().toUpperCase(); // Kept upper for ID uniqueness
            const p = document.getElementById('nuPass').value.trim();
            const r = document.getElementById('nuRole').value;
            if(!n || !id || !p) return toast("Enter name, ID and password", "error");
            if(db.users.some(u=>u.id===id)) return toast("User ID exists", "error");
            db.users.push({id, name:n, role:r, password:p});
            saveDB(); toast("Staff Member Added"); render();
        }

        function deleteUser(id) { if(id===currentUser.id) return; db.users=db.users.filter(u=>u.id!==id); saveDB(); render(); }
        function addParty() {
            const n = document.getElementById('npName').value.trim(); // Removed toUpperCase()
            if(!n) return;
            db.parties.push({id: crypto.randomUUID(), name:n});
            saveDB(); render();
        }
        function deleteParty(id) { db.parties=db.parties.filter(p=>p.id!==id); saveDB(); render(); }
        function deleteSample(id) { if(confirm('Erase this record?')) { db.samples=db.samples.filter(s=>s.id!==id); saveDB(); render(); } }

        function getFilteredSamples() {
            let s = db.samples.filter(x=>x.status==='complete');
            const d = document.getElementById('fDate')?.value;
            if(d) s = s.filter(x=>x.createdAt.startsWith(d));
            return s.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
        }

        function downloadCSV() {
            const s = getFilteredSamples();
            if(!s.length) return toast("No completed reports to export", "error");
            const head = "Date,Serial,Garden,Vehicle,Gross Loaded,Empty Vehicle,Net Leaf,FLC%,Moisture%,Damage%,Final Weight\n";
            const body = s.map(x=>{
                return `${new Date(x.createdAt).toLocaleDateString()},${x.sampleSerialNo},${x.partyName},${x.vehicleNo},${x.grossLoadedWeight},${x.emptyVehicleWeight},${x.netWeight},${x.flcPercent},${x.moistureDeduction},${x.damagedLeaf},${x.finalCalculatedWeight}`;
            }).join('\n');
            const blob = new Blob([head+body], {type:'text/csv'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href=url; a.download=`flc_report_${new Date().toLocaleDateString()}.csv`; a.click();
        }

        loadDB();
        render();
    </script>
</body>
</html>
